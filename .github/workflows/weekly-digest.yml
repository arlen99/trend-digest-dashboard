name: Weekly Trend Digest (data layer)

# Refreshes the full pipeline — scrape, sound chart, TikTok trends, trend
# candidates, provenance, AND the IG Swipe File curation itself — and redeploys
# the dashboard. No Mac required, no manual curation step.
#
# curate_posts.py (Claude vision, via ANTHROPIC_API_KEY) replaces what used to
# be a human/Claude session looking at thumbnails by hand: it decides which
# fresh candidates belong on the board and tags them (hook, hookTypes, triggers,
# visualStyles, notes). It runs fully automatically — no review gate — so its
# own prompt is the only filter against monetization bait, sponsored/branded
# posts, and off-niche content. Trend Radar card prose is a separate, still-
# manual concern (see CLOUD_SETUP.md).

on:
  schedule:
    - cron: "7 8 * * 1"   # Mondays 08:07 UTC — adjust for your timezone
  workflow_dispatch: {}    # allow manual runs from the Actions tab

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # allow the workflow to push the refreshed dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system deps (ffmpeg + Tesseract OCR)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg tesseract-ocr

      - name: Run the full pipeline (scrape, curate, build)
        env:
          TIKHUB_TOKEN: ${{ secrets.TIKHUB_TOKEN }}
          AUDD_TOKEN: ${{ secrets.AUDD_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          OCR_CMD: tools/ocr_tesseract.sh          # macOS Vision -> Tesseract on Linux
          CLIPS_PER_ACCOUNT: "20"
        run: |
          set -e
          TODAY=$(date +%F)
          python3 apply_account_edits.py   # apply dashboard add/removes → accounts.json + tiktok_accounts.json BEFORE scraping
          python3 accumulate.py            # archive prior week's data BEFORE this week's pipeline writes over it
          python3 scrape.py
          python3 tiktok_scrape.py
          python3 scrape_dedupe.py         # strip any post ever curated before (by shortcode/id, not raw URL) → *_fresh.json
          python3 keyword_posts.py
          python3 audio_trends.py
          python3 tiktok_trends.py
          python3 chart_audd.py
          python3 hook_text.py output/top_posts_${TODAY}_fresh.json --limit 150
          python3 fetch_thumbs.py output/top_posts_${TODAY}_fresh.json
          python3 fetch_carousels.py output/top_posts_${TODAY}_fresh.json
          python3 trends.py
          python3 hook_search.py
          # dashboard data refresh
          python3 curate_posts.py output/top_posts_${TODAY}_fresh.json   # the IG Swipe File itself — Claude picks + tags
          python3 audio_chart_to_dashboard.py
          python3 tiktok_to_dashboard.py --top 12
          python3 keyword_posts_to_dashboard.py --top 12
          python3 fetch_videos.py        # self-host videos on Vercel Blob → durable native inline playback
          python3 provenance.py
          python3 build_dashboard.py

      - name: Commit & deploy (push from repo root → Vercel)
        run: |
          git config user.email "arlentan@gmail.com"
          git config user.name "Trend Digest Bot"
          git add -A
          git commit -m "weekly data refresh $(date +%F)" || echo "no changes"
          git push
        # Vercel auto-deploys from this repo's main branch (Root Directory = dashboard/).
