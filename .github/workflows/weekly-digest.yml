name: Weekly Trend Digest (data layer)

# Refreshes the full pipeline — scrape, sound chart, TikTok trends, trend
# candidates, provenance, the IG Swipe File curation, AND the Trend Radar cards
# themselves — and redeploys the dashboard. No Mac required, no manual step.
#
# curate_posts.py (Claude vision, via ANTHROPIC_API_KEY) replaces what used to
# be a human/Claude session looking at thumbnails by hand: it decides which
# fresh candidates belong on the board and tags them (hook, hookTypes, triggers,
# visualStyles, notes). curate_trends.py does the same for Trend Radar — turns
# trends.py's + hook_search.py's raw evidence packs into actual cards (name,
# format description, trigger, "Ride it" copy). Both run fully automatically —
# no review gate — so their prompts are the only filter against noise,
# monetization bait, sponsored/branded posts, and off-niche content.

on:
  schedule:
    - cron: "7 8 * * 1"   # Mondays 08:07 UTC — adjust for your timezone
  workflow_dispatch: {}    # allow manual runs from the Actions tab

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # allow the workflow to push the refreshed dashboard
      issues: write            # allow tools/pipeline_notify.py to open/close the failure-notification issue
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system deps (ffmpeg + Tesseract OCR)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg tesseract-ocr

      - name: Run the full pipeline (scrape, curate, build)
        id: pipeline
        env:
          TIKHUB_TOKEN: ${{ secrets.TIKHUB_TOKEN }}
          AUDD_TOKEN: ${{ secrets.AUDD_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          OCR_CMD: tools/ocr_tesseract.sh          # macOS Vision -> Tesseract on Linux
          CLIPS_PER_ACCOUNT: "20"
        run: |
          set -eo pipefail
          TODAY=$(date +%F)
          LOG=pipeline_run.log
          : > "$LOG"

          # Supplementary sections (their own board subsection, not the core IG Swipe
          # File) — a failure here (e.g. today's TikHub 402) shouldn't sacrifice a
          # 50-minute run over one secondary feature. Every consumer of these scripts'
          # output already falls back to last week's committed file if this week's is
          # missing (verified: audio_chart_to_dashboard.py/provenance.py/etc. all use
          # a latest-file-or-default pattern) — worst case is stale data in one
          # section, never a crash. fetch_videos.py/fetch_audio.py are here too since
          # the dashboard already has a platform-embed fallback for missing native video.
          run_optional() {
            echo "▶ $* (non-critical)" | tee -a "$LOG"
            if ! "$@" 2>&1 | tee -a "$LOG"; then
              echo "⚠ FAILED (non-critical, continuing): $*" | tee -a "$LOG"
            fi
          }
          # Everything else stays fail-fast: nothing meaningful can be built without it.
          run_critical() {
            echo "▶ $*" | tee -a "$LOG"
            "$@" 2>&1 | tee -a "$LOG"
          }

          run_critical python3 apply_account_edits.py   # apply dashboard add/removes → accounts.json + tiktok_accounts.json BEFORE scraping
          run_critical python3 accumulate.py            # archive prior week's data BEFORE this week's pipeline writes over it
          run_critical python3 scrape.py
          run_critical python3 tiktok_scrape.py
          run_critical python3 scrape_dedupe.py         # strip any post ever curated before (by shortcode/id, not raw URL) → *_fresh.json
          run_optional python3 keyword_posts.py
          run_optional python3 audio_trends.py
          run_optional python3 tiktok_trends.py
          run_optional python3 chart_audd.py
          run_critical python3 hook_text.py output/top_posts_${TODAY}_fresh.json --limit 150
          run_critical python3 fetch_thumbs.py output/top_posts_${TODAY}_fresh.json
          run_critical python3 fetch_carousels.py output/top_posts_${TODAY}_fresh.json
          run_critical python3 trends.py
          run_critical python3 hook_search.py
          # dashboard data refresh
          run_critical python3 curate_posts.py output/top_posts_${TODAY}_fresh.json   # the IG Swipe File itself — Claude picks + tags
          run_critical python3 curate_trends.py output/trends_${TODAY}.json output/hook_trends_${TODAY}.json   # Trend Radar cards — Claude writes name/format/trigger/howTo
          run_critical python3 audio_chart_to_dashboard.py
          run_critical python3 tiktok_to_dashboard.py --top 12
          run_critical python3 keyword_posts_to_dashboard.py --top 12
          run_optional python3 fetch_videos.py        # self-host videos on Vercel Blob → durable native inline playback
          run_optional python3 fetch_audio.py         # self-host each sound-chart track's REAL audio → durable inline previews (replaces Deezer)
          run_critical python3 provenance.py
          run_critical python3 build_dashboard.py

      - name: Notify on failures / auto-resolve
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PIPELINE_OUTCOME: ${{ steps.pipeline.outcome }}
        run: python3 tools/pipeline_notify.py pipeline_run.log

      - name: Commit & deploy (push from repo root → Vercel)
        run: |
          git config user.email "arlentan@gmail.com"
          git config user.name "Trend Digest Bot"
          git add -A
          git commit -m "weekly data refresh $(date +%F)" || echo "no changes"
          # The full pipeline can run 30+ min (curate_posts.py alone makes ~35
          # sequential Claude calls) — if origin/main moved during that window
          # (e.g. a manual push), a plain `git push` gets rejected as non-fast-
          # forward and the whole run's work is silently lost. Rebase onto
          # whatever's there now before pushing, retrying once if a second push
          # also lands in between.
          for attempt in 1 2 3; do
            git fetch -q origin main
            git rebase origin/main && git push && break
            echo "Push attempt $attempt lost a race with origin/main — retrying..."
            git rebase --abort 2>/dev/null || true
            sleep 5
          done
        # Vercel auto-deploys from this repo's main branch (Root Directory = dashboard/).
